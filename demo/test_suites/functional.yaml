# Functional tests for Code Writer Agents
# Run (from the atp-platform root):
#   uv run atp test demo/test_suites/functional.yaml --adapter=http \
#     --adapter-config='endpoint=http://localhost:8001' --runs=3

test_suite: "code_writer_functional"
version: "1.0"
description: "Correctness checks: generated code passes unit tests"

defaults:
  runs_per_test: 3
  timeout_seconds: 60
  constraints:
    max_steps: 3
    max_tokens: 15000
    timeout_seconds: 60
    budget_usd: 0.05
  scoring:
    quality_weight: 0.3
    completeness_weight: 0.4
    efficiency_weight: 0.2
    cost_weight: 0.1

tests:
  # FN-001: Fibonacci — simple task
  - id: "FN-001"
    name: "Fibonacci — code passes unit tests"
    tags: ["functional", "high", "simple"]
    task:
      description: "Write a Python module with a fibonacci(n) function"
      input_data:
        requirements: |
          Write a function fibonacci(n: int) -> int:
          - Accepts a non-negative integer n
          - Returns the n-th Fibonacci number
          - fibonacci(0) = 0, fibonacci(1) = 1
          - Raises ValueError for negative n
          - Must work for large n (up to 1000) without overflow
        language: "python"
        filename: "fibonacci.py"
      expected_artifacts: ["fibonacci.py"]
    assertions:
      - type: "artifact_exists"
        config:
          path: "fibonacci.py"
      - type: "code_exec"
        config:
          command: "python -m pytest demo/fixtures/tests/test_fibonacci.py -v --tb=short"
          expected_exit_code: 0
      - type: "llm_eval"
        config:
          criteria: "completeness"
          threshold: 0.8
          prompt: "Evaluate whether the code implements every requirement: fibonacci(n), ValueError for n<0, support for large n"

  # FN-002: CSV parser — medium task
  - id: "FN-002"
    name: "CSV parser — code passes unit tests"
    tags: ["functional", "high", "medium"]
    task:
      description: "Write a Python module for working with CSV files"
      input_data:
        requirements: |
          Write a module with three functions:

          1. read_csv(path: str) -> list[dict[str, str]]
             - Reads a CSV file and returns a list of dicts
             - The first row is the header
             - Raises FileNotFoundError if the file does not exist

          2. filter_rows(data: list[dict], column: str, value: str) -> list[dict]
             - Filters rows where column == value
             - Raises KeyError if the column does not exist

          3. write_csv(data: list[dict], path: str) -> None
             - Writes a list of dicts to a CSV file
             - Headers are derived from the keys of the first dict
             - If data is empty, creates an empty file

          Use only the standard library (the csv module).
        language: "python"
        filename: "csv_parser.py"
      expected_artifacts: ["csv_parser.py"]
    assertions:
      - type: "artifact_exists"
        config:
          path: "csv_parser.py"
      - type: "code_exec"
        config:
          command: "python -m pytest demo/fixtures/tests/test_csv_parser.py -v --tb=short"
          expected_exit_code: 0
      - type: "llm_eval"
        config:
          criteria: "completeness"
          threshold: 0.8
          prompt: "Evaluate whether the code implements all three functions: read_csv, filter_rows, write_csv with error handling"

  # FN-003: REST API client — complex task
  - id: "FN-003"
    name: "REST API client — code passes unit tests"
    tags: ["functional", "high", "complex"]
    task:
      description: "Write a Python module — an HTTP API client"
      input_data:
        requirements: |
          Write an APIClient class:

          class APIClient:
              def __init__(self, base_url: str, timeout: int = 30):
                  ...

              def get(self, path: str, params: dict | None = None) -> dict:
                  """GET request, returns the JSON response as a dict."""
                  ...

              def post(self, path: str, data: dict | None = None) -> dict:
                  """POST request with a JSON body, returns the JSON response."""
                  ...

          Requirements:
          - Use the httpx library
          - On HTTP errors (4xx, 5xx) raise httpx.HTTPStatusError
          - On timeout raise httpx.TimeoutException
          - On connection error raise httpx.ConnectError
          - The get method adds params as a query string
          - The post method sends data as a JSON body
        language: "python"
        filename: "api_client.py"
      expected_artifacts: ["api_client.py"]
    assertions:
      - type: "artifact_exists"
        config:
          path: "api_client.py"
      - type: "code_exec"
        config:
          command: "python -m pytest demo/fixtures/tests/test_api_client.py -v --tb=short"
          expected_exit_code: 0
      - type: "llm_eval"
        config:
          criteria: "completeness"
          threshold: 0.7
          prompt: "Evaluate whether the code implements the APIClient class with get/post methods, error handling, and timeouts"
