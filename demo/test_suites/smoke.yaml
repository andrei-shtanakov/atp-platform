# Smoke tests for Code Writer Agents
# Run (from the atp-platform root):
#   uv run atp test demo/test_suites/smoke.yaml --adapter=http \
#     --adapter-config='endpoint=http://localhost:8001'

test_suite: "code_writer_smoke"
version: "1.0"
description: "Baseline checks: the agent responds, code is valid, format is correct"

defaults:
  runs_per_test: 1
  timeout_seconds: 60
  constraints:
    max_steps: 3
    max_tokens: 10000
    timeout_seconds: 60
    budget_usd: 0.05
  scoring:
    quality_weight: 0.3
    completeness_weight: 0.4
    efficiency_weight: 0.2
    cost_weight: 0.1

tests:
  # SM-001: Agent responds and returns a Python file
  - id: "SM-001"
    name: "Agent returns a Python file"
    tags: ["smoke", "critical"]
    task:
      description: "Write a Python function fibonacci(n) that returns the n-th Fibonacci number"
      input_data:
        requirements: "Function fibonacci(n) accepts a non-negative integer n. Returns the n-th Fibonacci number. fibonacci(0)=0, fibonacci(1)=1."
        language: "python"
        filename: "fibonacci.py"
      expected_artifacts: ["fibonacci.py"]
    assertions:
      - type: "artifact_exists"
        config:
          path: "fibonacci.py"
      - type: "behavior"
        config:
          check: "no_errors"

  # SM-002: Response matches the JSON Schema
  - id: "SM-002"
    name: "Response is valid against the JSON Schema"
    tags: ["smoke", "critical"]
    task:
      description: "Write a Python function add(a, b) that adds two numbers"
      input_data:
        requirements: "Function add(a, b) accepts two numbers and returns their sum."
        language: "python"
        filename: "add.py"
      expected_artifacts: ["add.py"]
    assertions:
      - type: "artifact_exists"
        config:
          path: "add.py"
      - type: "behavior"
        config:
          check: "no_errors"

  # SM-003: Generated code compiles
  - id: "SM-003"
    name: "Code is syntactically valid"
    tags: ["smoke", "critical"]
    task:
      description: "Write a Python function is_palindrome(s) that checks whether a string is a palindrome"
      input_data:
        requirements: "Function is_palindrome(s) accepts a string and returns True if the string reads the same forwards and backwards (case-insensitive, ignoring whitespace)."
        language: "python"
        filename: "palindrome.py"
      expected_artifacts: ["palindrome.py"]
    assertions:
      - type: "artifact_exists"
        config:
          path: "palindrome.py"
      - type: "code_exec"
        config:
          command: "python -c \"import ast; ast.parse(open('palindrome.py').read()); print('OK')\""
          expected_exit_code: 0
