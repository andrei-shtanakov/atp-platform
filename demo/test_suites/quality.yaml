# Code quality tests for Code Writer Agents
# Run (from the atp-platform root):
#   uv run atp test demo/test_suites/quality.yaml --adapter=http \
#     --adapter-config='endpoint=http://localhost:8001'

test_suite: "code_writer_quality"
version: "1.0"
description: "Quality checks: style, documentation, error handling"

defaults:
  runs_per_test: 1
  timeout_seconds: 60
  constraints:
    max_steps: 3
    max_tokens: 15000
    timeout_seconds: 60
    budget_usd: 0.05
  scoring:
    quality_weight: 0.5
    completeness_weight: 0.2
    efficiency_weight: 0.1
    cost_weight: 0.2

tests:
  # QL-001: Code contains docstrings
  - id: "QL-001"
    name: "Code contains docstrings"
    tags: ["quality", "medium"]
    task:
      description: "Write a Python module with a fibonacci(n) function"
      input_data:
        requirements: |
          Function fibonacci(n: int) -> int:
          - Accepts a non-negative integer n
          - Returns the n-th Fibonacci number
          - fibonacci(0) = 0, fibonacci(1) = 1
          - Raises ValueError for negative n
          The code must be well documented.
        language: "python"
        filename: "fibonacci.py"
      expected_artifacts: ["fibonacci.py"]
    assertions:
      - type: "artifact_exists"
        config:
          path: "fibonacci.py"
      - type: "contains"
        config:
          path: "fibonacci.py"
          pattern: '"""'
      - type: "llm_eval"
        config:
          criteria: "quality"
          threshold: 0.8
          prompt: "Evaluate docstring quality: does it describe the function, parameters, return value, and exceptions?"

  # QL-002: Code follows PEP 8
  - id: "QL-002"
    name: "Code follows PEP 8"
    tags: ["quality", "medium"]
    task:
      description: "Write a Python module for working with CSV files"
      input_data:
        requirements: |
          Write a module with the following functions:
          - read_csv(path: str) -> list[dict[str, str]]
          - filter_rows(data: list[dict], column: str, value: str) -> list[dict]
          - write_csv(data: list[dict], path: str) -> None
          Use the standard library csv module.
          The code must strictly follow PEP 8.
        language: "python"
        filename: "csv_parser.py"
      expected_artifacts: ["csv_parser.py"]
    assertions:
      - type: "artifact_exists"
        config:
          path: "csv_parser.py"
      - type: "code_exec"
        config:
          command: "python -m py_compile csv_parser.py && echo 'Syntax OK'"
          expected_exit_code: 0
      - type: "llm_eval"
        config:
          criteria: "quality"
          threshold: 0.75
          prompt: |
            Evaluate the code against PEP 8 criteria:
            - snake_case for functions and variables
            - Line length <= 88 characters
            - Type hints for parameters and return values
            - Proper indentation and whitespace
            - Imports on separate lines

  # QL-003: Code handles edge cases
  - id: "QL-003"
    name: "Code handles edge cases"
    tags: ["quality", "medium"]
    task:
      description: "Write a Python APIClient class for HTTP requests"
      input_data:
        requirements: |
          APIClient class:
          - __init__(self, base_url: str, timeout: int = 30)
          - get(self, path: str, params: dict | None = None) -> dict
          - post(self, path: str, data: dict | None = None) -> dict
          Use httpx. Handle all plausible error cases.
        language: "python"
        filename: "api_client.py"
      expected_artifacts: ["api_client.py"]
    assertions:
      - type: "artifact_exists"
        config:
          path: "api_client.py"
      - type: "llm_eval"
        config:
          criteria: "quality"
          threshold: 0.75
          prompt: |
            Evaluate how well the code handles edge cases:
            - HTTP errors (4xx, 5xx) — raised or handled?
            - Timeout — is it handled?
            - Connection error — is it handled?
            - Empty or non-JSON response — is there a guard?
            - base_url with/without a trailing slash — normalized?
