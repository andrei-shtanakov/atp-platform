# atp.config.yaml — ATP configuration for Code Writer Agents
log_level: INFO
parallel_workers: 2
default_timeout: 60
fail_fast: false
sandbox_enabled: false
runs_per_test: 1

# LLM (for llm_eval assertions)
openai_api_key: ${OPENAI_API_KEY}
default_llm_model: gpt-4o-mini
default_provider: openai
max_retries: 3
request_timeout: 60

# Agents
agents:
  - name: "openai-coder"
    type: "http"
    config:
      endpoint: "http://localhost:8001"
      timeout: 60

  - name: "anthropic-coder"
    type: "http"
    config:
      endpoint: "http://localhost:8002"
      timeout: 60
