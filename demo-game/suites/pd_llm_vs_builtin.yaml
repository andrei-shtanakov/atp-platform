# Prisoner's Dilemma: GPT-4o-mini vs built-in strategies
#
# GPT-4o-mini plays against deterministic strategies.
# Lets us evaluate the strategic reasoning of the LLM.
#
# Run:
#   1. Start the agent: uv run python -m uvicorn demo-game.agents.openai_game_agent:app --port 8010
#   2. Run the test:    uv run atp game run demo-game/suites/pd_llm_vs_builtin.yaml --episodes=5

type: game_suite
name: "PD: GPT-4o-mini vs TitForTat"
version: "1.0"

game:
  type: prisoners_dilemma
  variant: repeated
  config:
    num_rounds: 20
    noise: 0.0
    discount_factor: 1.0

agents:
  - name: gpt4o-mini
    adapter: http
    endpoint: http://localhost:8010
    config:
      timeout: 30
      allow_internal: true

  - name: tit_for_tat
    adapter: builtin
    strategy: tit_for_tat

evaluation:
  episodes: 5
  metrics:
    - type: average_payoff
      weight: 1.0
