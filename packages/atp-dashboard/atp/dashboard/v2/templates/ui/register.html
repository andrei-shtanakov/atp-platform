<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - ATP Platform</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <style>
        .register-container {
            max-width: 400px;
            margin: 10vh auto;
            padding: 2rem;
        }
        .register-header {
            text-align: center;
            margin-bottom: 2rem;
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="register-header">
            <h1>ATP Platform</h1>
            <p>Create Account</p>
        </div>

        <div id="error-msg" style="display:none; color:red; margin-bottom:1rem;"></div>
        <div id="success-msg" style="display:none; color:green; margin-bottom:1rem;"></div>

        <article>
            <form id="register-form">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required autofocus placeholder="Choose a username">

                <label for="email">Email</label>
                <input type="email" id="email" name="email" required placeholder="you@example.com">

                <label for="password">Password</label>
                <input type="password" id="password" name="password" required minlength="6" placeholder="Min 6 characters">

                <button type="submit" id="register-btn">Create account</button>
            </form>

            <p style="text-align:center; margin-top:1rem; font-size:0.9rem;">
                Already have an account? <a href="/ui/login">Sign in</a>
            </p>
        </article>
    </div>

    <script>
        const form = document.getElementById('register-form');
        const errorMsg = document.getElementById('error-msg');
        const successMsg = document.getElementById('success-msg');
        const registerBtn = document.getElementById('register-btn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';
            registerBtn.disabled = true;
            registerBtn.setAttribute('aria-busy', 'true');

            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password }),
                });

                if (!res.ok) {
                    const data = await res.json().catch(() => ({}));
                    throw new Error(data.detail || 'Registration failed');
                }

                successMsg.textContent = 'Account created! Redirecting to login...';
                successMsg.style.display = 'block';
                setTimeout(() => { window.location.href = '/ui/login'; }, 1500);
            } catch (err) {
                errorMsg.textContent = err.message;
                errorMsg.style.display = 'block';
            } finally {
                registerBtn.disabled = false;
                registerBtn.removeAttribute('aria-busy');
            }
        });
    </script>
</body>
</html>
