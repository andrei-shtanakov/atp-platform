<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - ATP Platform</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <style>
        .register-container {
            max-width: 420px;
            margin: 10vh auto;
            padding: 2rem;
        }
        .register-header {
            text-align: center;
            margin-bottom: 2rem;
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="register-header">
            <h1>ATP Platform</h1>
            <p>Create Account</p>
        </div>

        <div id="error-msg" style="display:none; color:red; margin-bottom:1rem;"></div>
        <div id="success-msg" style="display:none; color:green; margin-bottom:1rem;"></div>

        <article>
            {% if registration_mode == "invite" %}
            <p style="font-size: 0.9rem; color: #666;">
                Registration requires an invite code from an administrator.
            </p>
            {% endif %}

            <form id="register-form">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required autofocus minlength="3" maxlength="50" placeholder="Choose a username">

                <label for="email">Email</label>
                <input type="email" id="email" name="email" required maxlength="255" placeholder="you@example.com">

                <label for="password">Password (min 8 characters)</label>
                <input type="password" id="password" name="password" required minlength="8">

                <label for="password_confirm">Confirm password</label>
                <input type="password" id="password_confirm" name="password_confirm" required minlength="8">

                {% if registration_mode == "invite" %}
                <label for="invite_code">Invite code</label>
                <input type="text" id="invite_code" name="invite_code" required placeholder="Paste the code your admin sent you">
                {% endif %}

                <button type="submit" id="register-btn">Create account</button>
            </form>

            <p style="text-align:center; margin-top:1rem; font-size:0.9rem;">
                Already have an account? <a href="/ui/login">Sign in</a>
            </p>
            <p style="text-align:center; font-size:0.85rem; color:#888;">
                <a href="/ui/about">About the platform</a>
            </p>
        </article>
    </div>

    <script>
        const form = document.getElementById('register-form');
        const errorMsg = document.getElementById('error-msg');
        const successMsg = document.getElementById('success-msg');
        const registerBtn = document.getElementById('register-btn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';

            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const passwordConfirm = document.getElementById('password_confirm').value;
            const inviteInput = document.getElementById('invite_code');
            const invite_code = inviteInput ? inviteInput.value.trim() : null;

            if (password !== passwordConfirm) {
                errorMsg.textContent = 'Passwords do not match';
                errorMsg.style.display = 'block';
                return;
            }

            registerBtn.disabled = true;
            registerBtn.setAttribute('aria-busy', 'true');

            const body = { username, email, password };
            if (invite_code) body.invite_code = invite_code;

            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body),
                });

                if (!res.ok) {
                    const data = await res.json().catch(() => ({}));
                    throw new Error(data.detail || 'Registration failed');
                }

                successMsg.textContent = 'Account created! Redirecting to login...';
                successMsg.style.display = 'block';
                setTimeout(() => { window.location.href = '/ui/login'; }, 1500);
            } catch (err) {
                errorMsg.textContent = err.message;
                errorMsg.style.display = 'block';
            } finally {
                registerBtn.disabled = false;
                registerBtn.removeAttribute('aria-busy');
            }
        });
    </script>
</body>
</html>
