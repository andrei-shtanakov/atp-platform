{% extends "base.html" %}

{% block title %}ATP Catalog - {{ suite_slug }}{% endblock %}

{% block content %}
<div id="catalog-suite-root"
     data-category="{{ category_slug }}"
     data-suite="{{ suite_slug }}"></div>
{% endblock %}

{% block scripts %}
<script type="text/babel">
{% raw %}
function CatalogSuitePage() {
    const el = document.getElementById('catalog-suite-root');
    const categorySlug = el.dataset.category;
    const suiteSlug = el.dataset.suite;

    const [suite, setSuite] = React.useState(null);
    const [leaderboard, setLeaderboard] = React.useState({});
    const [loading, setLoading] = React.useState(true);
    const [error, setError] = React.useState(null);

    React.useEffect(() => {
        const base = `/api/catalog/categories/${categorySlug}/suites/${suiteSlug}`;
        Promise.all([
            fetch(base).then(r => r.ok ? r.json() : Promise.reject(r.statusText)),
            fetch(`${base}/leaderboard`).then(r => r.ok ? r.json() : Promise.reject(r.statusText)),
        ])
        .then(([suiteData, lbData]) => {
            setSuite(suiteData);
            setLeaderboard(lbData);
            setLoading(false);
        })
        .catch(err => { setError(String(err)); setLoading(false); });
    }, [categorySlug, suiteSlug]);

    if (loading) return <div className="p-8 text-gray-500">Loading suite...</div>;
    if (error) return <div className="p-8 text-red-500">Error: {error}</div>;
    if (!suite) return null;

    return (
        <div className="p-8 max-w-5xl mx-auto">
            <div className="mb-2">
                <a href="/catalog" className="text-blue-600 hover:underline text-sm">&larr; Catalog</a>
            </div>
            <h1 className="text-3xl font-bold mb-1">{suite.name}</h1>
            <div className="text-sm text-gray-500 mb-2">
                {suite.category} &bull; {suite.author} &bull; {suite.source}
                {suite.difficulty && <span> &bull; {suite.difficulty}</span>}
            </div>
            {suite.description && (
                <p className="text-gray-600 mb-6">{suite.description}</p>
            )}

            <h2 className="text-xl font-semibold mb-3">Tests ({suite.tests.length})</h2>
            <div className="space-y-4">
                {suite.tests.map(test => (
                    <div key={test.slug} className="bg-white rounded-lg shadow p-4">
                        <div className="flex justify-between items-start mb-2">
                            <h3 className="font-medium">{test.name}</h3>
                            {test.difficulty && (
                                <span className="text-xs bg-gray-100 text-gray-600 px-2 py-0.5 rounded">
                                    {test.difficulty}
                                </span>
                            )}
                        </div>
                        <p className="text-sm text-gray-600 mb-3">{test.task_description}</p>
                        <div className="text-xs text-gray-500 mb-3">
                            {test.total_submissions} submission{test.total_submissions !== 1 ? 's' : ''}
                            {test.avg_score != null && <span> &bull; avg {test.avg_score.toFixed(1)}</span>}
                            {test.best_score != null && <span> &bull; best {test.best_score.toFixed(1)}</span>}
                        </div>

                        {leaderboard[test.slug] && leaderboard[test.slug].length > 0 && (
                            <div>
                                <h4 className="text-xs font-medium text-gray-500 uppercase mb-1">Top Submissions</h4>
                                <table className="min-w-full text-sm">
                                    <thead>
                                        <tr className="text-left text-xs text-gray-400">
                                            <th className="pr-3">Rank</th>
                                            <th className="pr-3">Agent</th>
                                            <th className="pr-3">Score</th>
                                            <th className="pr-3">Quality</th>
                                            <th>Completeness</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {leaderboard[test.slug].map(sub => (
                                            <tr key={sub.rank} className="border-t border-gray-100">
                                                <td className="pr-3 py-1">{sub.rank}</td>
                                                <td className="pr-3 py-1">{sub.agent_name}</td>
                                                <td className="pr-3 py-1">{sub.score.toFixed(1)}</td>
                                                <td className="pr-3 py-1">{sub.quality_score.toFixed(1)}</td>
                                                <td className="py-1">{sub.completeness_score.toFixed(1)}</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        )}
                    </div>
                ))}
            </div>
        </div>
    );
}

const root = document.getElementById('catalog-suite-root');
if (root) {
    ReactDOM.createRoot(root).render(<CatalogSuitePage />);
}
{% endraw %}
</script>
{% endblock %}
