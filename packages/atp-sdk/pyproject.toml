[project]
name = "atp-sdk"
version = "0.1.0"
description = "Python SDK for ATP benchmark platform"
requires-python = ">=3.12"
dependencies = [
    "httpx>=0.27",
    "pydantic>=2.0",
    "atp-core>=1.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-anyio",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["atp_sdk"]

[tool.uv.sources]
atp-core = { workspace = true }
