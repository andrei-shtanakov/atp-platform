[project]
name = "atp-platform-sdk"
version = "2.0.0"
description = "Python SDK for ATP benchmark platform — run benchmarks, submit results, view leaderboards"
requires-python = ">=3.12"
license = { text = "MIT" }
authors = [{ name = "Andrei Shtanakov" }]
readme = "README.md"
keywords = ["ai", "agents", "benchmarks", "testing", "evaluation"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Testing",
]
dependencies = [
    "httpx>=0.27",
    "pydantic>=2.0",
]

[project.urls]
Homepage = "https://github.com/andrei-shtanakov/atp-platform"
Documentation = "https://github.com/andrei-shtanakov/atp-platform/tree/main/packages/atp-sdk"
Repository = "https://github.com/andrei-shtanakov/atp-platform"

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-anyio",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["atp_sdk"]
