[project]
name = "atp-method"
version = "0.1.0"
description = "ATP plugin: run agent-eval-case methodology cases through the platform"
readme = "README.md"
requires-python = ">=3.12"
authors = [{ name = "ATP Platform Contributors" }]
keywords = ["ai-agents", "atp", "evaluation", "methodology", "agent-eval-case"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
    "pydantic>=2.0",
    "pyyaml>=6.0",
    "fastapi>=0.128.0",
    "uvicorn>=0.40.0",
    # atp-platform provides the loader models (atp.loader), the suite-source /
    # format-dispatch registries (added in 2.1.0), the evaluator base + LLM judge
    # (atp.evaluators), and the critical-assertion hard gate (2.1.0) the plugin
    # builds on — so 2.1.0 is the real floor.
    "atp-platform>=2.1.0",
]

[project.entry-points."atp.plugins"]
method = "atp_method.plugin:register"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["atp_method"]

[tool.ruff]
line-length = 88
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.coverage.run]
source = ["atp_method"]

[tool.pyrefly]
project-includes = ["atp_method/**/*.py"]

[tool.uv.sources]
atp-platform = { workspace = true }

[dependency-groups]
dev = [
    "atp-platform",
    "pytest>=9.0.2",
    "pytest-anyio>=0.0.0",
    "pytest-cov>=7.0.0",
    "ruff>=0.14.0",
]
