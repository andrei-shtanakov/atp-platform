name: CI

on:
  push:
    branches: [main, master, develop, "task/*"]
  pull_request:
    branches: [main, master, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Install dependencies
        run: |
          uv sync --all-extras --dev

      - name: Run ruff format check
        run: |
          uv run ruff format --check .

      - name: Run ruff lint
        run: |
          uv run ruff check .

      - name: Run pyrefly type check
        run: |
          uv run pyrefly check

      - name: Run tests with coverage
        run: |
          uv run pytest tests/ -v --cov=atp --cov-report=term-missing --cov-report=xml --cov-fail-under=80

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
        continue-on-error: true


  tournament-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - name: Sync deps
        run: uv sync --all-packages --group dev
      - name: Tournament unit tests + static guards
        env:
          COVERAGE_FILE: .coverage.tournament-unit
        run: >-
          uv run pytest tests/unit/dashboard/tournament
          tests/unit/dashboard/mcp
          tests/unit/dashboard/migrations
          -v --cov=atp.dashboard.tournament
          --cov-report=xml
        timeout-minutes: 2
      - name: Upload tournament unit coverage data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tournament-unit-coverage
          path: .coverage.tournament-unit
          if-no-files-found: error
          include-hidden-files: true

  tournament-integration:
    runs-on: ubuntu-latest
    needs: tournament-unit
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - name: Sync deps
        run: uv sync --all-packages --group dev
      - name: Tournament integration tests
        env:
          COVERAGE_FILE: .coverage.tournament-integration
        run: >-
          uv run pytest tests/integration/dashboard/tournament
          -v --cov=atp.dashboard.tournament
          --cov-report=xml
        timeout-minutes: 10
      - name: Upload tournament integration coverage data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tournament-integration-coverage
          path: .coverage.tournament-integration
          if-no-files-found: error
          include-hidden-files: true

  tournament-e2e:
    runs-on: ubuntu-latest
    needs: tournament-integration
    if: >-
      github.event_name == 'push' ||
      contains(github.event.pull_request.labels.*.name, 'tournament-e2e')
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - name: Sync deps
        run: uv sync --all-packages --group dev
      - name: Tournament e2e tests
        env:
          COVERAGE_FILE: .coverage.tournament-e2e
        run: >-
          uv run pytest tests/e2e/dashboard/tournament
          -v
          --cov=atp.dashboard.tournament
          --cov-report=xml
        timeout-minutes: 15
      - name: Upload tournament e2e coverage data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tournament-e2e-coverage
          path: .coverage.tournament-e2e
          if-no-files-found: error
          include-hidden-files: true

  tournament-coverage-gate:
    runs-on: ubuntu-latest
    needs: [tournament-unit, tournament-integration]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - name: Sync deps
        run: uv sync --all-packages --group dev
      - name: Download tournament unit coverage data
        uses: actions/download-artifact@v4
        with:
          name: tournament-unit-coverage
          path: .coverage-artifacts/unit
      - name: Download tournament integration coverage data
        uses: actions/download-artifact@v4
        with:
          name: tournament-integration-coverage
          path: .coverage-artifacts/integration
      - name: Combine tournament coverage data
        run: >-
          uv run coverage combine
          .coverage-artifacts/unit/.coverage.tournament-unit
          .coverage-artifacts/integration/.coverage.tournament-integration
      - name: Enforce 85% coverage floor on tournament package
        run: uv run coverage report --fail-under=85

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Install dependencies
        run: |
          uv sync --dev

      - name: Check formatting
        run: |
          uv run ruff format --check .

      - name: Check linting
        run: |
          uv run ruff check .

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build production Docker image
        run: docker compose -f deploy/docker-compose.yml build platform

      - name: Start platform container
        env:
          SECRET_KEY: "ci-test-secret-key-not-for-production"
          ATP_DISABLE_AUTH: "true"
        run: |
          docker compose -f deploy/docker-compose.yml up -d platform
          # Wait for container to become healthy (up to 60s)
          for i in $(seq 1 12); do
            if curl -sf http://localhost:8080/api/health > /dev/null 2>&1; then
              echo "Health check passed on attempt $i"
              exit 0
            fi
            sleep 5
          done
          echo "Health check failed after 60s"
          docker compose -f deploy/docker-compose.yml logs platform
          exit 1

      - name: Teardown
        if: always()
        run: docker compose -f deploy/docker-compose.yml down -v
