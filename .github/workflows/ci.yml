name: CI

on:
  push:
    branches: [main, master, develop, "task/*"]
  pull_request:
    branches: [main, master, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Install dependencies
        run: |
          uv sync --all-extras --dev

      - name: Run ruff format check
        run: |
          uv run ruff format --check .

      - name: Run ruff lint
        run: |
          uv run ruff check .

      - name: Run pyrefly type check
        run: |
          uv run pyrefly check

      - name: Run tests with coverage
        run: |
          uv run pytest tests/ -v --cov=atp --cov-report=term-missing --cov-report=xml --cov-fail-under=80

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
        continue-on-error: true


  tournament-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - name: Sync deps
        run: uv sync --all-packages --group dev
      - name: Tournament unit tests + static guards
        run: >-
          uv run pytest tests/unit/dashboard/tournament
          tests/unit/dashboard/mcp
          tests/unit/dashboard/migrations
          -v --cov=atp.dashboard.tournament
          --cov-report=xml
        timeout-minutes: 2

  tournament-integration:
    runs-on: ubuntu-latest
    needs: tournament-unit
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - name: Sync deps
        run: uv sync --all-packages --group dev
      - name: Tournament integration tests
        run: >-
          uv run pytest tests/integration/dashboard/tournament
          -v --cov=atp.dashboard.tournament
          --cov-append --cov-report=xml
        timeout-minutes: 10

  tournament-e2e:
    runs-on: ubuntu-latest
    needs: tournament-integration
    if: >-
      github.event_name == 'push' ||
      contains(github.event.pull_request.labels.*.name, 'tournament-e2e')
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - name: Sync deps
        run: uv sync --all-packages --group dev
      - name: Tournament e2e tests
        run: >-
          uv run pytest tests/e2e/dashboard/tournament
          -v
          --cov=atp.dashboard.tournament
          --cov-append --cov-report=xml
        timeout-minutes: 15

  tournament-coverage-gate:
    runs-on: ubuntu-latest
    needs: [tournament-unit, tournament-integration]
    steps:
      - uses: actions/checkout@v4
      - name: Enforce 85% coverage floor on tournament package
        run: uv run coverage report --fail-under=85

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Install dependencies
        run: |
          uv sync --dev

      - name: Check formatting
        run: |
          uv run ruff format --check .

      - name: Check linting
        run: |
          uv run ruff check .
