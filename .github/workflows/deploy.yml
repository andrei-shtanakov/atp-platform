name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Every push to main auto-deploys. Use workflow_dispatch for manual triggers.
    # Previously required [deploy] tag in commit message, but PR merge commits
    # don't contain it — causing missed deploys (Plan 2a incident #9).

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/atp-platform/deploy
            git -C .. pull origin main
            docker compose build --quiet platform
            docker compose up -d platform
            echo "Deploy complete: $(docker compose ps platform --format '{{.Status}}')"
