server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;

    # Replace atp.example.com with your actual domain name
    ssl_certificate /etc/letsencrypt/live/atp.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/atp.example.com/privkey.pem;

    client_max_body_size 10M;

    location / {
        proxy_pass http://platform:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ws {
        proxy_pass http://platform:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}
