# ATP on-prem demo (variant 2): platform + agent, both containerized.
#
# The platform tests the agent over HTTP across the compose network — no Docker
# socket, no privileges. The same suite.yaml also drives the cloud variant
# (Bedrock Agent) by swapping only the adapter.
#
# Docker:
#   docker compose up --build -d agent dashboard
#   docker compose run --rm atp          # one-shot test run
#   open http://localhost:8080/ui/        # browse the run (auth disabled)
#   docker compose down -v
#
# Podman (rootless — preferred on-prem):
#   podman compose up --build -d agent dashboard
#   podman compose run --rm atp

services:
  # ---- Agent under test: long-lived HTTP service -------------------------
  agent:
    build: ./agent
    image: atp-demo-http-agent:latest
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ---- ATP platform: one-shot test runner --------------------------------
  atp:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: atp-platform:latest
    depends_on:
      agent:
        condition: service_healthy
    volumes:
      - ./suite.yaml:/work/suite.yaml:ro
      - ./results:/work/results
      - atp-data:/root/.atp          # shared DB so the dashboard sees this run
    # No working_dir override: `uv run` must run from /app (the image WORKDIR,
    # where the uv project + venv live) to find the `atp` entrypoint. The paths
    # below are absolute (/work/...), resolved via the volume mounts above.
    # Same suite, on-prem adapter. Cloud variant swaps to:
    #   --adapter=bedrock --adapter-config agent_id=...,agent_alias_id=...,region=...
    # allow_internal=true is REQUIRED here: the http adapter blocks private IPs
    # (SSRF guard), and the compose service name resolves to a private address.
    command: >
      uv run --no-sync atp test /work/suite.yaml
      --adapter=http
      --adapter-config endpoint=http://agent:8000/execute,allow_internal=true
      --output=json
      --output-file=/work/results/results.json

  # ---- ATP dashboard: browse run history at /ui/ -------------------------
  dashboard:
    image: atp-platform:latest
    build:
      context: ../..
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ATP_SECRET_KEY=demo-secret-change-me
      - ATP_DISABLE_AUTH=true
    volumes:
      - atp-data:/root/.atp           # same volume as the atp runner
    command: uv run --no-sync atp dashboard --host 0.0.0.0 --port 8080

  # ===== Methodology profile (--profile method) ===========================
  # Runs the agent-eval-case sweep (method/cases/req-extraction) against an
  # LLM-backed agent to reveal the "curve of collapse".
  #
  # Air-gapped (default): point the agent at a local model; the grader reuses the
  # same model automatically — no external calls, no keys.
  #   export LLM_BASE_URL=http://host.docker.internal:11434/v1   # e.g. Ollama
  #   export LLM_MODEL=llama3.1            # LLM_API_KEY unset → no auth header
  #
  # Hosted grader instead: comment out the atp-method ATP_JUDGE_BASE_URL line and
  # set ANTHROPIC_API_KEY.
  #
  #   docker compose --profile method up --build -d agent-llm dashboard
  #   docker compose --profile method run --rm atp-method

  # ---- LLM-backed agent under test ---------------------------------------
  agent-llm:
    build: ./agent-llm
    image: atp-demo-llm-agent:latest
    profiles: ["method"]
    expose:
      - "8000"
    environment:
      - LLM_BASE_URL=${LLM_BASE_URL:-https://api.openai.com/v1}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o-mini}
      - LLM_API_KEY=${LLM_API_KEY:-}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ---- ATP runner: the methodology sweep ---------------------------------
  atp-method:
    image: atp-platform:latest
    build:
      context: ../..
      dockerfile: Dockerfile
    profiles: ["method"]
    depends_on:
      agent-llm:
        condition: service_healthy
    environment:
      # Grader (LLMJudgeEvaluator). By default it reuses the SAME local model as
      # the agent (air-gapped) — the judge's base_url points at the agent's
      # LLM_BASE_URL, so one local model serves both. To use a hosted Anthropic
      # judge instead, comment out the ATP_JUDGE_BASE_URL line below and set
      # ANTHROPIC_API_KEY. (Flat interpolation only — podman compose does not
      # support nested ${A-${B}} defaults.)
      - ATP_JUDGE_BASE_URL=${LLM_BASE_URL:-https://api.openai.com/v1}
      - ATP_JUDGE_MODEL=${LLM_MODEL:-gpt-4o-mini}
      - OPENAI_API_KEY=${LLM_API_KEY:-local}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    volumes:
      - ../../method:/work/method:ro   # the case files (plugin code is in the image)
      - ./results:/work/results
      - atp-data:/root/.atp
    # Same platform, methodology content. critical_check hard-gates the trap;
    # --runs surfaces the curve of collapse across clean/moderate/severe.
    command: >
      uv run --no-sync atp test /work/method/cases/req-extraction
      --adapter=http
      --adapter-config endpoint=http://agent-llm:8000/execute,allow_internal=true
      --runs=5
      --output=json
      --output-file=/work/results/method-results.json

volumes:
  atp-data:

networks:
  default:
    name: atp-compose-demo
