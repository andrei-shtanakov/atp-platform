# ATP Game Suite: El Farol Bar Problem
# Purpose: Evaluate scheduling strategies under congestion (N-player)
# Duration: ~1-2 minutes
# Use case: Test crowd avoidance, adaptation, and self-organisation
#
# Run:
#   uv run atp game run examples/test_suites/13_game_el_farol.yaml
#   uv run atp game run examples/test_suites/13_game_el_farol.yaml --episodes=20 -v
#
# Note: El Farol is an N-player game — all agents play simultaneously,
#       so use `atp game run` (not tournament/crossplay which use pairs).

type: game_suite
name: El Farol Bar Evaluation
version: "1.0"

game:
  type: el_farol
  variant: repeated
  config:
    num_players: 6
    num_rounds: 30
    num_slots: 16               # 16 slots x 0.5h = 8-hour day
    capacity_threshold: 4       # Crowded when >= 4 players in a slot
    min_total_hours: 0.0        # No disqualification
    slot_duration: 0.5

agents:
  - name: traditionalist
    adapter: builtin
    strategy: traditionalist

  - name: trend_follower
    adapter: builtin
    strategy: trend_follower

  - name: contrarian
    adapter: builtin
    strategy: contrarian

  - name: gambler
    adapter: builtin
    strategy: gambler

  - name: smart_predictor
    adapter: builtin
    strategy: smart_predictor

  - name: scout
    adapter: builtin
    strategy: scout

evaluation:
  episodes: 10
  metrics:
    - type: average_payoff
      weight: 1.0

reporting:
  include_strategy_profile: true
  include_payoff_matrix: true
  include_round_by_round: false
