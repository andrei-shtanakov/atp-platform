# Alembic configuration for ATP Platform databases.
#
# Two databases: dashboard and analytics.
# Usage:
#   uv run alembic -n dashboard upgrade head
#   uv run alembic -n dashboard revision --autogenerate -m "description"
#   uv run alembic -n analytics upgrade head
#   uv run alembic -n analytics revision --autogenerate -m "description"

[alembic]
# Default section (not used directly — use -n dashboard or -n analytics)
script_location = %(here)s/migrations/dashboard
prepend_sys_path = .
path_separator = os

[dashboard]
script_location = %(here)s/migrations/dashboard
sqlalchemy.url = sqlite:///%(here)s/.atp-dashboard.db
prepend_sys_path = .
path_separator = os

[analytics]
script_location = %(here)s/migrations/analytics
sqlalchemy.url = sqlite:///%(here)s/.atp-analytics.db
prepend_sys_path = .
path_separator = os

[post_write_hooks]
hooks = ruff
ruff.type = exec
ruff.executable = ruff
ruff.options = check --fix REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
