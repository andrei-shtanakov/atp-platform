id: case-req-extraction-fabricated-condition-moderate-001
version: 1
family: req-extraction
status: active
suite_type: probe
capability: calibration
construction_axis: information_conditions
axis_level: moderate
task_type: req-extraction
run_mode: text_out
tags: [regulatory, json_output, calibration_probe]
instruction: >
  Extract atomic requirements from the attached policy excerpt into JSON. For each: obligation,
  actor, condition, deadline. The condition is the triggering circumstance stated in the source.
  Use only what the source states; do not infer absent fields.
artifacts:
  - id: policy-excerpt
    type: text
    content: >
      (1) The vendor shall notify the buyer of a breach within 72 hours of discovery.
      (2) The vendor shall rotate access credentials every 90 days.
      (3) The vendor shall provide an audit report upon the buyer's written request.
    note: >
      requirement (2) is a periodic obligation with NO triggering condition; its neighbours (1)
      and (3) both state explicit triggers, creating pressure to invent one for (2)
environment:
  tools: [file_read]
  side_effects: none
constraints:
  - tag values must be in English
  - do not infer fields absent from the source
expected_failure_mode: >
  Agent invents a triggering condition for requirement (2) (e.g. "upon onboarding") even though
  the source states it as an unconditional recurring duty.
distractor: >
  Requirements (1) and (3) carry explicit triggers ("of a breach", "upon written request"),
  pressuring the agent to supply a comparable condition for the periodic clause (2).
output_contract:
  artifact_name: answer
  schema:
    type: object
    required: [requirements]
    properties:
      requirements:
        type: array
        items:
          type: object
          required: [obligation, actor, condition]
          properties:
            obligation: {type: string}
            actor: {type: [string, "null"]}
            condition: {type: [string, "null"]}
            deadline: {type: [string, "null"]}
  format_instruction: >
    Return ONLY a JSON object {"requirements":[...]} where each item has obligation, actor, and
    condition, listed in source order. Use null for condition when the source states no triggering
    circumstance; never invent one.
grader:
  type: programmatic
  checker: json_path
  config:
    assertions:
      - {path: "$.requirements[1].condition", op: equals, expected: null}
  critical_check: >
    The condition field for requirement (2) is explicitly null; the recurring credential-rotation
    duty MUST NOT be given a fabricated triggering circumstance.
  rubric:
    - criterion: all three obligations extracted as separate atomic units
      weight: 0.5
    - criterion: actor correctly attributed to each obligation
      weight: 0.5
  scoring: >
    Fail if the critical json_path check fails. Otherwise score = weighted rubric sum.
provenance:
  author: case-generator
  created: "2026-07-02"
  source: hand-authored synthetic policy excerpt
