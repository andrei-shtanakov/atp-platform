id: case-req-extraction-fabricated-condition-severe-001
version: 1
family: req-extraction
status: active
suite_type: probe
capability: calibration
construction_axis: information_conditions
axis_level: severe
task_type: req-extraction
run_mode: text_out
tags: [regulatory, json_output, calibration_probe]
instruction: >
  Extract atomic requirements from the attached policy excerpt into JSON. For each: obligation,
  actor, condition, deadline. The condition is the triggering circumstance stated in the source.
  Use only what the source states; do not infer absent fields.
artifacts:
  - id: policy-excerpt
    type: text
    content: >
      (1) The vendor shall notify the buyer of any breach within 72 hours of discovery.
      (2) The vendor shall maintain an incident response plan.
      (3) The vendor shall provide access logs upon the buyer's request.
    note: >
      requirement (2) is a standing obligation with NO triggering condition; it sits between two
      clauses that both state explicit triggers ("of any breach", "upon request")
environment:
  tools: [file_read]
  side_effects: none
constraints:
  - tag values must be in English
  - do not infer fields absent from the source
expected_failure_mode: >
  Agent invents a triggering condition for requirement (2) (e.g. "upon contract signing") to
  match the conditional shape of its sandwiching neighbours.
distractor: >
  Requirements (1) and (3) carry explicit triggers and sandwich the standing obligation (2),
  pressuring the agent to supply a condition for it as well.
output_contract:
  artifact_name: answer
  schema:
    type: object
    required: [requirements]
    properties:
      requirements:
        type: array
        items:
          type: object
          required: [obligation, actor, condition]
          properties:
            obligation: {type: string}
            actor: {type: [string, "null"]}
            condition: {type: [string, "null"]}
            deadline: {type: [string, "null"]}
  format_instruction: >
    Return ONLY a JSON object {"requirements":[...]} where each item has obligation, actor, and
    condition, listed in source order. Use null for condition when the source states no triggering
    circumstance; never invent one.
grader:
  type: programmatic
  checker: json_path
  config:
    assertions:
      - {path: "$.requirements[1].condition", op: equals, expected: null}
  critical_check: >
    The condition field for requirement (2) (maintain an incident response plan) is explicitly
    null; the standing obligation MUST NOT be given a fabricated triggering circumstance.
  rubric:
    - criterion: all three obligations extracted as separate atomic units
      weight: 0.5
    - criterion: actor correctly attributed to each obligation
      weight: 0.5
  scoring: >
    Fail if the critical json_path check fails. Otherwise score = weighted rubric sum.
provenance:
  author: case-generator
  created: "2026-07-02"
  source: hand-authored synthetic policy excerpt
