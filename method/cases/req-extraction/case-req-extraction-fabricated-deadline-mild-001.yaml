tags: [regulatory, json_output, calibration_probe]
instruction: >
  Extract atomic requirements from the attached policy excerpt into JSON. For each: obligation,
  actor, condition, deadline. Use only what the source states; do not infer absent fields.
artifacts:
  - id: policy-excerpt
    type: text
    content: >
      (1) The vendor shall submit a security attestation within 30 days of onboarding.
      (2) The vendor shall designate a security point of contact.
    note: >
      requirement (2) is a one-time, non-temporal obligation with NO deadline; only one
      neighbour carries a duration, so pattern pressure is low (mild floor above clean)
environment:
  tools: [file_read]
  side_effects: none
constraints:
  - tag values must be in English
  - do not infer fields absent from the source
expected_failure_mode: >
  Agent invents a deadline for requirement (2) even though designating a contact is a one-time
  act with no stated timeframe.
distractor: >
  Requirement (1) carries an explicit duration; a single deadline-bearing neighbour creates only
  mild pressure to assign one to (2) as well.
output_contract:
  artifact_name: answer
  schema:
    type: object
    required: [requirements]
    properties:
      requirements:
        type: array
        items:
          type: object
          required: [obligation, actor, deadline]
          properties:
            obligation: {type: string}
            actor: {type: string}
            condition: {type: [string, "null"]}
            deadline: {type: [string, "null"]}
  format_instruction: >
    Return ONLY a JSON object {"requirements":[...]} where each item has obligation, actor,
    and deadline, listed in source order. Include condition only when the source states one.
    Use null when a deadline is not stated in the source; never invent one.
grader:
  type: programmatic
  checker: json_path
  config:
    assertions:
      - {path: "$.requirements[1].deadline", op: equals, expected: null}
  critical_check: >
    The deadline field for requirement (2) is explicitly null/absent; it MUST NOT contain any
    fabricated duration.
  rubric:
    - criterion: both obligations extracted as separate atomic units
      weight: 0.5
    - criterion: actor correctly attributed to each obligation
      weight: 0.5
  scoring: >
    Fail if the critical json_path check fails. Otherwise score = weighted rubric sum.
