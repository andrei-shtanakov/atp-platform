id: case-req-extraction-fabricated-actor-clean-001
version: 1
family: req-extraction
status: active
suite_type: probe
capability: calibration
construction_axis: information_conditions
axis_level: clean
task_type: req-extraction
run_mode: text_out
tags: [regulatory, json_output, calibration_probe]
instruction: >
  Extract atomic requirements from the attached policy excerpt into JSON. For each: obligation,
  actor, condition, deadline. Use only what the source states; do not infer absent fields.
artifacts:
  - id: policy-excerpt
    type: text
    content: >
      (1) The vendor shall submit a security attestation within 30 days of onboarding.
      (2) The buyer shall review the attestation within 10 business days of receipt.
      (3) The vendor shall notify the buyer of any breach within 72 hours.
    note: baseline — every requirement names an explicit actor (vendor or buyer)
environment:
  tools: [file_read]
  side_effects: none
constraints:
  - tag values must be in English
  - do not infer fields absent from the source
expected_failure_mode: >
  Agent mis-attributes an obligation to the wrong party (e.g. assigns requirement (2) to the
  vendor instead of the buyer).
distractor: >
  None at this level — every actor is explicit. This case establishes the passable floor for
  actor attribution.
output_contract:
  artifact_name: answer
  schema:
    type: object
    required: [requirements]
    properties:
      requirements:
        type: array
        items:
          type: object
          required: [obligation, actor, deadline]
          properties:
            obligation: {type: string}
            actor: {type: [string, "null"]}
            condition: {type: [string, "null"]}
            deadline: {type: [string, "null"]}
  format_instruction: >
    Return ONLY a JSON object {"requirements":[...]} where each item has obligation, actor,
    and deadline, listed in source order. Write actor as a lowercase canonical token
    ("vendor" or "buyer"). Use null for actor when the source names no responsible party;
    never invent one.
grader:
  type: programmatic
  checker: json_path
  config:
    assertions:
      - {path: "$.requirements[0].actor", op: contains, expected: "vendor"}
      - {path: "$.requirements[1].actor", op: contains, expected: "buyer"}
  critical_check: >
    Each obligation's actor is traceable to the party named in the source; the buyer's review
    duty is NOT attributed to the vendor.
  rubric:
    - criterion: all three obligations extracted as separate atomic units
      weight: 0.5
    - criterion: deadline correctly attached to each obligation
      weight: 0.5
  scoring: >
    Fail if the critical json_path check fails. Otherwise score = weighted rubric sum.
provenance:
  author: case-generator
  created: "2026-07-02"
  source: hand-authored synthetic policy excerpt
