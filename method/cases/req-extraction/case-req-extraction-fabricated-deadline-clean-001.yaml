id: case-req-extraction-fabricated-deadline-clean-001
version: 1
family: req-extraction
status: active
suite_type: probe
capability: calibration
construction_axis: information_conditions
axis_level: clean
task_type: req-extraction
run_mode: text_out
tags: [regulatory, json_output, calibration_probe]
instruction: >
  Extract atomic requirements from the attached policy excerpt into JSON. For each: obligation,
  actor, condition, deadline. Use only what the source states; do not infer absent fields.
artifacts:
  - id: policy-excerpt
    type: text
    content: >
      (1) The vendor shall submit a security attestation within 30 days of onboarding.
      (2) The vendor shall renew the attestation annually.
      (3) The vendor shall notify the buyer of any breach within 72 hours.
    note: baseline — every requirement carries an explicit deadline
environment:
  tools: [file_read]
  side_effects: none
constraints:
  - tag values must be in English
  - do not infer fields absent from the source
expected_failure_mode: >
  Agent emits a deadline value that is not present in the source text.
distractor: >
  None at this level — all deadlines are explicit. This case establishes the passable floor.
output_contract:
  artifact_name: answer
  schema:
    type: object
    required: [requirements]
    properties:
      requirements:
        type: array
        items:
          type: object
          required: [obligation, actor, deadline]
          properties:
            obligation: {type: string}
            actor: {type: string}
            condition: {type: [string, "null"]}
            deadline: {type: [string, "null"]}
  format_instruction: >
    Return ONLY a JSON object {"requirements":[...]} where each item has obligation, actor,
    condition, deadline, listed in source order. Use null when a field is not stated in the
    source.
grader:
  type: programmatic
  checker: json_path
  config:
    assertions:
      - {path: "$.requirements[0].deadline", op: contains, expected: "30 days"}
      - {path: "$.requirements[2].deadline", op: contains, expected: "72 hours"}
  critical_check: >
    Every deadline value in the output is traceable to an explicit span in the source;
    no deadline is invented.
  rubric:
    - criterion: all three obligations extracted as separate atomic units
      weight: 0.5
    - criterion: actor correctly attributed to each obligation
      weight: 0.5
  scoring: >
    Fail if the critical json_path check fails. Otherwise score = weighted rubric sum.
provenance:
  author: case-generator
  created: "2026-06-06"
  source: hand-authored synthetic policy excerpt
